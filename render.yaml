# Render Blueprint — deploys the ATLANTIS agent backend as a persistent
# Node web service. The frontend (mamiwaterf) stays on Vercel; point its
# VITE_BACKEND_URL and VITE_BACKEND_API_URL at this service's URL.
#
# One-click: Render dashboard → New → Blueprint → pick this repo. Render reads
# this file, creates the service, and prompts for the secrets marked
# `sync: false` (paste them from backend/.env). Public on-chain IDs are inlined.
#
# Why a persistent service (not Vercel serverless): /api/agents/eval blocks for
# 1–4 min and the in-flight dedup uses in-process state — both need a long-lived
# process, which serverless functions don't provide.
services:
  - type: web
    name: atlantis-backend
    runtime: node
    rootDir: backend
    plan: free # free tier sleeps after 15 min idle (~30–50s cold start); bump to starter for always-warm
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Secrets: paste these in the Render dashboard when prompted ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BLOCKBERRY_API_KEY
        sync: false
      - key: TRADEPORT_API_KEY
        sync: false
      - key: ENOKI_API_KEY
        sync: false
      - key: AGENT_SECRET_KEY
        sync: false
      - key: AGENT_CAP_ID
        sync: false
      - key: MEMWAL_DELEGATE_KEY
        sync: false
      - key: MEMWAL_ACCOUNT_ID
        sync: false
      # --- Public config: safe to inline (already in committed constants.ts) ---
      - key: TRADEPORT_API_USER
        value: atlantis
      - key: MEMWAL_SERVER_URL
        value: https://relayer.staging.memwal.ai
      - key: AGENT_REPORTS_PACKAGE_ID
        value: "0x39686a532ba9bce7cd81aef8b49cb56598f75ef54821bf3c670b8d2840e91e31"
      - key: AGENT_REPORTS_REGISTRY_ID
        value: "0x2dc59dbfaa39953644847fa154d5c331197cdd2e0991bef04899e6df5c37ae85"
